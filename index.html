   <style>
        
    :root {
    --primary: #990000;
    --text: #f8fafc;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Patrick Hand', cursive;
    color: var(--text);
    background: #000;
    overflow-x: hidden;
}

/* ================= FOND ================= */

#bg-panorama {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 300vw; /* 🔥 3 pages */

    background-image: url("arriereplan.PNG");
    background-repeat: no-repeat;
    background-size: cover;

    background-position: left center;

    z-index: -2;
    transition: transform 0.35s ease;
}


#bg-fog {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(circle at 20% 30%, rgba(255,0,0,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(120,0,0,0.10), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.6), transparent 60%);
    animation: fogMove 12s ease-in-out infinite alternate;
}

@keyframes fogMove {
    0% { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
}

/* ================= APP ================= */

.app-container {
    width: 100%;
    padding: 20px 15px 140px;
}

/* ================= BULLES ================= */

/* GRILLE DES BULLES (DIFFÉRÉ, ORACLE, LIBRE) */
/* BULLES DE STATISTIQUES */
.bubbles-grid .bubble {
    width: 100px !important;   /* Ajusté pour accueillir la grande police */
    height: 90px !important; 
    background-color: rgba(0, 0, 0, 0.7) !important;
    border: 1px solid rgba(255, 69, 0, 0.4) !important;
    border-radius: 12px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    padding: 10px !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6) !important;
}

/* LE TITRE (ORACLE, LIBRE, ETC.) -> 14px */
.bubbles-grid .bubble-label {
    font-size: 14px !important; 
    color: #ff4500 !important; /* Couleur feu pour le titre */
    text-transform: uppercase !important;
    font-family: 'Cinzel', serif !important;
    margin-bottom: 5px !important;
    letter-spacing: 1px;
}

/* LE CHIFFRE (MONTANT) -> 24px */
.bubbles-grid .bubble-val {
    font-size: 24px !important; 
    font-weight: 900 !important;
    color: #ffffff !important;
    text-shadow: 2px 2px 4px #000 !important;
    font-family: 'Bangers', cursive !important; /* Police grasse pour le chiffre */
    width: 100%;
    text-align: center;
    white-space: nowrap;
}

/* ================= SWIPE MOBILE ================= */

#swipe-wrapper {
    overflow: hidden;
}

#swipe-track {
    display: flex;
    width: 300%;
    transform: translateX(-33.33%);
    transition: transform 0.35s ease;
}

.view-pane {
    width: 33.33%;
    padding: 0 5px;
}

/* ================= NAV ================= */

.nav-bar {
    position: fixed;
    bottom: 0;

    display: flex;
}
.section-title {
    display: inline-block;
    padding: 6px 14px;

    border-radius: 999px;

    color: #aaa;
    font-family: Cinzel, serif;
    font-size: 16px; /* +3px */

    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);

    text-align: center;
}
.cat-card {
    background: rgba(153, 0, 0, 0.06); /* 🔥 très translucide */
    border: 1px solid rgba(153, 0, 0, 0.15);

    border-radius: 16px;

    margin-bottom: 12px;
    padding: 12px;

    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);

    box-shadow: 
        0 0 10px rgba(153, 0, 0, 0.08),
        inset 0 0 10px rgba(0,0,0,0.4);

    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.cat-card:active {
    transform: scale(0.98);
}

.cat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;

    font-family: Cinzel, serif;
    font-size: 13px;
    color: #ddd;

    margin-bottom: 8px;
    letter-spacing: 1px;
}
.cat-card:hover {
    box-shadow: 
        0 0 18px rgba(153, 0, 0, 0.18),
        inset 0 0 12px rgba(0,0,0,0.5);
}
.cat-icon {
    width: 36px;   /* +40% environ */
    height: 36px;
    object-fit: contain;

    filter: drop-shadow(0 0 6px rgba(153,0,0,0.7));
}
.btn-glass {
    padding: 6px 10px;   /* plus petit */
    font-size: 13px;     /* texte réduit */

    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(153,0,0,0.35);

    backdrop-filter: blur(6px);

    color: #ddd;

    box-shadow: 
        0 0 10px rgba(153,0,0,0.2),
        inset 0 0 10px rgba(0,0,0,0.6);

    transition: all 0.2s ease;
}

/* 👉 TU AJOUTES JUSTE EN DESSOUS */

.btn-glass {
    animation: pulseBtn 4s ease-in-out infinite;
}

@keyframes pulseBtn {
    0%,100% { box-shadow: 0 0 10px rgba(153,0,0,0.2); }
    50% { box-shadow: 0 0 20px rgba(153,0,0,0.5); }
}

.btn-glass:hover {
    background: rgba(153,0,0,0.25);
    box-shadow: 
        0 0 15px rgba(153,0,0,0.5),
        inset 0 0 10px rgba(0,0,0,0.8);

    transform: translateY(-1px);
}

.btn-glass:active {
    transform: scale(0.97);
}
.floating-actions {
    display: flex;
    justify-content: center;
    gap: 12px;

    margin: 10px 0 15px;
}

.floating-btn {
    width: 55px;
    height: 55px;

    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 22px;

    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(153,0,0,0.4);

    backdrop-filter: blur(6px);

    box-shadow:
        0 0 15px rgba(153,0,0,0.3),
        inset 0 0 10px rgba(0,0,0,0.7);

    transition: all 0.2s ease;
}
.floating-btn:hover {
    transform: scale(1.1);
    box-shadow:
        0 0 25px rgba(255,0,0,0.6),
        inset 0 0 12px rgba(0,0,0,0.9);
}

.floating-btn:active {
    transform: scale(0.95);
}
.floating-btn {
    animation: floatPulse 4s ease-in-out infinite;
}

@keyframes floatPulse {
    0%,100% {
        box-shadow: 0 0 15px rgba(153,0,0,0.3);
    }
    50% {
        box-shadow: 0 0 30px rgba(153,0,0,0.6);
    }
}
.btn-floating {
    padding: 10px 16px;
    border-radius: 12px;

    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(153,0,0,0.5);

    color: #eee;
    font-family: Cinzel, serif;
    font-size: 14px;

    backdrop-filter: blur(6px);

    box-shadow:
        0 0 12px rgba(153,0,0,0.3),
        inset 0 0 10px rgba(0,0,0,0.7);

    transition: all 0.2s ease;
}

.btn-floating:hover {
    background: rgba(153,0,0,0.25);
    transform: translateY(-2px);
}

.btn-floating:active {
    transform: scale(0.95);
}
/* --- VERSION AMÉLIORÉE DU BOUTON MAGIQUE --- */
.btn-floating, .btn-sang, .btn-primary {
    position: relative !important;
    overflow: hidden !important;
    background-image: url("ecrit.gif") !important; 
    background-size: cover !important;
    background-position: center !important;
    
    /* AMÉLIORATION DE LA VISIBILITÉ : */
    filter: brightness(1.4) contrast(1.2) saturate(1.3); /* Rend le GIF plus vif */
    box-shadow: 0 0 15px rgba(153, 0, 0, 0.7) !important; /* Lueur rouge autour */
    border: 1px solid #ff4500 !important; /* Bordure orange/feu */
    
    text-shadow: 2px 2px 4px #000, 0px 0px 10px #000 !important; /* Texte bien lisible */
    font-weight: bold !important;
    color: #fff !important;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

/* Effet de pression quand on clique */
.btn-floating:active, .btn-sang:active {
    transform: scale(0.95);
    filter: brightness(1.8);
}

/* Conteneur du texte pour être sûr qu'il soit au-dessus */
.btn-floating span, .btn-sang span {
    position: relative;
    z-index: 2;
}
/* --- STYLE SPÉCIFIQUE POUR LE PARCHEMIN "MON BUTIN" --- */

/* --- LE GRAND PARCHEMENT "MON BUTIN" --- */

/* --- LE PARCHEMIN PUR (SANS HALO) --- */

/* Nettoyage total pour le parchemin */
/* --- NETTOYAGE RADICAL ET FORCE BRUTE --- */

    box-shadow: none !important;

}

/* --- TITRE : MON BUTIN (28px) --- */
.bubble-butin .bubble-label {
    font-family: 'Cinzel', serif !important;

/* --- MONTANT : LE CHIFFRE (40px) --- */
.bubble-butin .bubble-val {

 #bg-panorama {

    z-index: 2 !important;
    
    /* SUPPRESSION DES MARGES PARASITES */
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1 !important; /* Évite un décalage vers le bas */
    
    font-family: 'Cinzel', serif !important;
    font-size: 0.9rem !important;
    color: #fff !important;
    text-align: center !important; /* Sécurité pour le texte sur deux lignes */
    text-transform: uppercase !important;
    letter-spacing: 2px !important;
    text-shadow: 2px 2px 8px #000 !important;
}

/* Animation de respiration pour les bulles */
@keyframes pulse-ritual {
    0% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
    50% { box-shadow: 0 0 25px rgba(255, 69, 0, 0.8); }
    100% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
}

.btn-sang {
    animation: pulse-ritual 3s infinite ease-in-out;
}
/* --- LE PARCHEMIN : STYLE GÉNÉRAL (PC) --- */
.bubble-butin {
    /* 1. Suppression du cadre jaune et des effets de clic */
    outline: none !important;
    border: none !important;
    box-shadow: none !important;
    background-color: transparent !important;
    -webkit-tap-highlight-color: transparent !important; /* Spécial iPhone */
    
    /* 2. L'image du parchemin */
    background-image: url('parchemin.png') !important;
    background-size: contain !important;
    background-repeat: no-repeat !important;
    background-position: center !important;

    /* 3. Dimensions pour l'ordinateur */
    width: 320px !important;
    height: 180px !important;
    margin: 10px auto !important;
    
    /* 4. Alignement du texte au centre */
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    
    /* 5. Look mystique */
    filter: drop-shadow(8px 8px 12px rgba(0,0,0,0.8)) !important;
    transform: rotate(-2deg) !important;
}

/* --- LE TEXTE : TITRE (PC : 24px) --- */
#labelButin {
    font-family: 'Cinzel', serif !important;
    font-size: 24px !important;
    color: #3d2b1f !important; /* Encre marron foncé */
    font-weight: 900 !important;
    text-transform: uppercase !important;
    margin-bottom: 5px !important;
    text-shadow: none !important;
}

/* --- LE TEXTE : MONTANT (PC : 40px) --- */
#sSolde {
    font-family: 'Bangers', cursive !important;
    font-size: 40px !important;
    color: #800000 !important; /* Rouge sang */
    font-weight: normal !important;
    text-shadow: none !important;
}

/* --- ADAPTATION POUR IPHONE / MOBILE --- */
@media (max-width: 600px) {
    .bubble-butin {
        width: 220px !important;  /* Plus petit sur mobile */
        height: 120px !important;
        padding: 10px !important;
    }

    #labelButin {
        font-size: 18px !important; /* Titre réduit sur mobile */
    }

    #sSolde {
        font-size: 28px !important; /* Chiffre réduit sur mobile */
    }
}
/* --- STYLE 1 : FRAKTUR (Le plus authentique / UnifrakturMaguntia) --- */
.sanctuarum-fraktur {
    font-family: 'UnifrakturMaguntia', cursive !important;
    font-size: 50px !important; /* Ajuste selon ton envie */
    color: #ff4500 !important;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.8) !important;
    letter-spacing: 2px;
}

/* --- STYLE 2 : GOTHIC TEXTURA (Plus lisible mais sombre / Pirata One) --- */
.sanctuarum-textura {
    font-family: 'Pirata One', system-ui !important;
    font-size: 55px !important;
    color: #ff4500 !important;
    text-transform: uppercase;
    letter-spacing: 4px;
}

/* --- STYLE 3 : RUNDGOTISCH / ROTONDE (Plus arrondi / Almendra Display) --- */
.sanctuarum-rotonde {
    font-family: 'Almendra Display', serif !important;
    font-size: 52px !important;
    font-weight: bold !important;
    color: #ff4500 !important;
}

/* --- STYLE 4 : SCHWABACHER (Style manuscrit ancien / MedievalSharp) --- */
.sanctuarum-schwabacher {
    font-family: 'MedievalSharp', cursive !important;
    font-size: 48px !important;
    color: #ff4500 !important;
    font-style: italic;
}
    </style>
</head>
<<body>
    <div id="bg-panorama"></div>
    <div id="bg-fog"></div>

    <div id="toast">Action réussie</div>

    <div class="app-container">
        
        <header class="top-bar">
            <div class="title-block">
                <h1 class="main-title-gothic">SANCTUARIUM</h1>
                <span class="subtitle-box">Mon budget zen</span>
            </div>

            <div class="bubble-butin">
    <small class="bubble-label" id="labelButin">MON BUTIN</small>
    <div class="bubble-val" id="sSolde">0.00€</div>
</div>
        </header>

       
<div class="floating-actions">
    <div class="btn-sang" onclick="showInternalSave()">
        <video src="flammes2.mp4" autoplay loop muted playsinline class="btn-video"></video>
        <span>ÉCRIT AVEC TON SANG</span>
    </div>
    <div class="btn-sang" onclick="openImportModal()">
        <video src="flammes2.mp4" autoplay loop muted playsinline class="btn-video"></video>
        <span>INVOCATION</span>
    </div>
</div>
        </div>
        <div class="bubbles-grid">
            <div class="bubble">
                <small class="bubble-label">DIFFÉRÉ</small>
                <div class="bubble-val" id="sEncours">0€</div>
            </div>

            <div class="bubble">
                <small class="bubble-label">ORACLE</small>
                <div class="bubble-val" id="sPrev">0€</div>
            </div>

            <div class="bubble">
                <small class="bubble-label">LIBRE</small>
                <div class="bubble-val" id="sReel">0€</div>
            </div>
        </div>

        <div id="swipe-wrapper">
            <div id="swipe-track">
                
                <div class="view-pane">
                    <div class="section-title">CHARGES FIXES</div>
                    <div id="catsGrid"></div>
                </div>

                <div class="view-pane">
                    <div class="section-title">JOURNAL CB</div>
                    <div class="cat-card journal-form" style="background-image: url('ecrit.gif');">
                        
                        <input type="text" id="txLib" placeholder="Lieu de l'offrande...">
                        
                        <div class="input-plus-group">
                            <input type="number" id="txAmt" placeholder="Montant">
                            <div class="btn-add-inline" onclick="addTx()">+</div>
                        </div>

                        <div class="radio-group">
                            <label><input type="radio" name="txType" value="immediat" checked> Immédiat</label>
                            <label><input type="radio" name="txType" value="differe"> Différé</label>
                        </div>
                    </div>
                    <div id="txList"></div>
                </div>

                <div class="view-pane">
                    <div class="section-title">VARIABLES</div>
                    <div id="varsGrid"></div>
                </div>

            </div>
        </div>

        <nav class="nav-bar">
            <button class="nav-btn" onclick="nav(0)">FIXES</button>
            <button class="nav-btn active" onclick="nav(1)">JOURNAL</button>
            <button class="nav-btn" onclick="nav(2)">VARIABLES</button>
        </nav>
    </div>

    </body>
<script>
const KEY = 'sanct_v4_triple';
const catConfig = { m:'Maison', c:'Credits', v:'Transport', a:'Abos', s:'Sante', o:'Autres' };
const varCats = ['Alimentaire', 'Carburants', 'Loisirs', 'Cadeaux', 'Equipement'];

let store = JSON.parse(localStorage.getItem(KEY)) || {
    solde: 3000, transactions: [],
    fixes: Object.keys(catConfig).map(id => ({id, items:[]})),
    variables: varCats.map(name => ({name, items:[]}))
};

const IS_PC  = () => window.innerWidth >= 768;
const PAGE_W = 390;
let currentPage = 1;

const track   = document.getElementById('swipe-track');
const wrapper = document.getElementById('swipe-wrapper');
const bg      = document.getElementById('bg-panorama');

function resetBackground() {
    const bg = document.getElementById('bg-panorama');

    // toujours reset propre
    bg.style.transform = '';
    bg.style.transition = '';
}

// Init unique
resetBackground();

function nav(idx) {
    currentPage = idx;

    const ease = 'transform 0.35s cubic-bezier(0.18,0.89,0.32,1.1)';
    track.style.transition = ease;
    track.style.transform  = `translateX(${idx * -33.33}%)`;

    // 🔥 MOBILE : le fond "glisse" horizontalement
    if (!IS_PC()) {
    bg.style.transform = `translateX(${-idx * 100}vw)`;
}

    document.querySelectorAll('.nav-btn')
        .forEach((b,i) => b.classList.toggle('active', i===idx));
}

// Touch swipe
let touchStartX=0, touchStartY=0, isDragging=false;

wrapper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging  = false;
    track.style.transition = 'none';
    if (!IS_PC()) bg.style.transition = 'none';
}, {passive:true});

wrapper.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isDragging && Math.abs(dy) > Math.abs(dx)) return;
    isDragging = true;
    e.preventDefault();
    track.style.transform = `translateX(calc(${currentPage * -33.33}% + ${dx}px))`;
    if (!IS_PC()) {
        bg.style.transform = `translateX(calc(${currentPage * -100}vw + ${dx}px))`;
    }
}, {passive:false});

wrapper.addEventListener('touchend', e => {
    if (!isDragging) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx < -50 && currentPage < 2) currentPage++;
    else if (dx > 50 && currentPage > 0) currentPage--;
    nav(currentPage);
}, {passive:true});

function update() {
    localStorage.setItem(KEY, JSON.stringify(store));
    let tf=0,pf=0,tv=0,pv=0;
    store.fixes.forEach(c=>c.items.forEach(it=>{tf+=it.amt;if(it.done)pf+=it.amt;}));
    store.variables.forEach(v=>v.items.forEach(it=>{tv+=it.amt;if(it.done)pv+=it.amt;}));
    const tCB   = store.transactions.filter(t=>t.type!=='differe').reduce((s,t)=>s+t.amt,0);
    const tDiff = store.transactions.filter(t=>t.type==='differe').reduce((s,t)=>s+t.amt,0);
    document.getElementById('sPrev').textContent    = (store.solde-tf-tv).toFixed(2)+'\u20AC';
    document.getElementById('sReel').textContent    = (store.solde-pf-pv-tCB).toFixed(2)+'\u20AC';
    document.getElementById('sEncours').textContent = tDiff.toFixed(2)+'\u20AC';
    document.getElementById('sSolde').textContent   = store.solde.toFixed(2)+'\u20AC';
}

function editSolde() {
    document.getElementById('butinModal').style.display='flex';
    document.getElementById('butinInput').value=store.solde;
    setTimeout(()=>document.getElementById('butinInput').focus(),100);
}
function confirmButin() {
    const v=parseFloat(document.getElementById('butinInput').value);
    if(!isNaN(v)){store.solde=v;render();showToast('Butin mis a jour !');}
    document.getElementById('butinModal').style.display='none';
}
const catIcons = {
  m: "maison_icon.jpg",
  c: "credit_icon.jpg",
  v: "hearse_icon.jpg",
  a: "subscriptions_icon.jpg",
  s: "health_icon.jpg",
  o: "other_icon.jpg"
};
function render() {
    const gridF=document.getElementById('catsGrid'); gridF.innerHTML='';
    store.fixes.forEach(cat=>{
        const div=document.createElement('div'); div.className='cat-card';
        div.innerHTML=`<div class="cat-header">
    <span style="display:flex;align-items:center;gap:8px;">
        <img src="${catIcons[cat.id]}" class="cat-icon">
        ${catConfig[cat.id]}
    </span>
    <span>${cat.items.reduce((s,i)=>s+i.amt,0)}\u20AC</span>
</div>
<div>${cat.items.map((it,i)=>`<div class="item-row"><input type="checkbox" ${it.done?'checked':''} onclick="toggleItem('fix','${cat.id}',${i})"><span class="item-label">${it.l}</span><span>${it.amt}\u20AC</span><button onclick="delItem('fix','${cat.id}',${i})" style="background:none;border:none;color:#777;margin-left:10px;">\xD7</button></div>`).join('')}</div>
<div style="display:flex;padding:10px;gap:5px;align-items:center;"><input type="text" id="fi-l-${cat.id}" placeholder="Nom" style="flex:2"><input type="number" id="fi-a-${cat.id}" placeholder="\u20AC" style="flex:1"><button class="btn-add-gif" onclick="addItem('fix','${cat.id}')">+</button></div>`;
        gridF.appendChild(div);
    });
    const gridV=document.getElementById('varsGrid'); gridV.innerHTML='';
    store.variables.forEach((cat,idx)=>{
        const div=document.createElement('div'); div.className='cat-card';
        div.innerHTML=`<div class="cat-header"><span>${cat.name}</span><span>${cat.items.reduce((s,i)=>s+i.amt,0)}\u20AC</span></div>
<div>${cat.items.map((it,i)=>`<div class="item-row"><input type="checkbox" ${it.done?'checked':''} onclick="toggleItem('var',${idx},${i})"><span class="item-label">${it.l}</span><span>${it.amt}\u20AC</span><button onclick="delItem('var',${idx},${i})" style="background:none;border:none;color:#777;margin-left:10px;">\xD7</button></div>`).join('')}</div>
<div style="display:flex;padding:10px;gap:5px;align-items:center;"><input type="text" id="vi-l-${idx}" placeholder="Objet" style="flex:2"><input type="number" id="vi-a-${idx}" placeholder="\u20AC" style="flex:1"><button class="btn-add-gif" onclick="addItem('var',${idx})">+</button></div>`;
        gridV.appendChild(div);
    });
    renderTx(); update();
}

function addItem(type,id){
    const l=document.getElementById(`${type==='fix'?'fi':'vi'}-l-${id}`);
    const a=document.getElementById(`${type==='fix'?'fi':'vi'}-a-${id}`);
    if(!l.value||!a.value)return;
    const list=type==='fix'?store.fixes.find(c=>c.id===id).items:store.variables[id].items;
    list.push({l:l.value,amt:parseFloat(a.value),done:false}); l.value=''; a.value=''; render();
}
function toggleItem(type,id,i){const list=type==='fix'?store.fixes.find(c=>c.id===id).items:store.variables[id].items;list[i].done=!list[i].done;render();}
function delItem(type,id,i){const list=type==='fix'?store.fixes.find(c=>c.id===id).items:store.variables[id].items;list.splice(i,1);render();}
function addTx(){const l=document.getElementById('txLib'),a=document.getElementById('txAmt'),t=document.querySelector('input[name="txType"]:checked').value;if(l.value&&a.value){store.transactions.unshift({lib:l.value,amt:parseFloat(a.value),type:t});l.value='';a.value='';render();}}
function renderTx(){document.getElementById('txList').innerHTML=store.transactions.map((t,i)=>`<div class="item-row" style="justify-content:space-between"><div>${t.lib} <small style="color:#777">(${t.type})</small></div><div>-${t.amt}\u20AC <button onclick="delTx(${i})" style="background:none;border:none;color:#777;margin-left:10px;">\xD7</button></div></div>`).join('');}
function delTx(i){store.transactions.splice(i,1);render();}

function showInternalSave(){document.getElementById('saveCodeArea').value=btoa(encodeURIComponent(JSON.stringify(store)));document.getElementById('internalSaveBox').style.display='block';}
function copyCode(){navigator.clipboard.writeText(document.getElementById('saveCodeArea').value);showToast('Copie !');}
function openImportModal(){document.getElementById('importModal').style.display='flex';}
function closeImportModal(){document.getElementById('importModal').style.display='none';}
function confirmImport(){try{store=JSON.parse(decodeURIComponent(atob(document.getElementById('importCodeArea').value.trim())));render();closeImportModal();showToast('Charge !');}catch(e){alert('Erreur');}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

render();
</script>

<div id="internalSaveBox" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;border:2px solid #990000;padding:20px;z-index:10000;width:90%;max-width:400px;">
    <textarea id="saveCodeArea" style="width:100%;height:100px;margin-bottom:10px;" readonly></textarea>
    <button class="btn btn-sang" style="width:100%;" onclick="copyCode()"><span>Copier</span></button>
    <button onclick="document.getElementById('internalSaveBox').style.display='none'" style="display:block;margin:10px auto;color:#777;background:none;border:none;">Fermer</button>
</div>

<div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#0a0a0f;border:2px solid #990000;padding:20px;width:100%;max-width:400px;">
        <textarea id="importCodeArea" style="width:100%;height:100px;margin-bottom:10px;" placeholder="Code..."></textarea>
        <button class="btn btn-sang" style="width:100%;" onclick="confirmImport()"><span>Invoquer</span></button>
        <button onclick="closeImportModal()" style="display:block;margin:10px auto;color:#777;background:none;border:none;">Annuler</button>
    </div>
</div>

<div id="butinModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#0a0a0f;border:2px solid #990000;border-radius:16px;padding:25px;width:100%;max-width:320px;text-align:center;box-shadow:0 0 30px rgba(153,0,0,0.4);">
        <div style="font-family:Cinzel,serif;font-size:12px;letter-spacing:3px;color:#aaa;margin-bottom:15px;">MON BUTIN</div>
        <input id="butinInput" type="number" style="width:100%;font-family:Bangers;font-size:32px;text-align:center;background:rgba(153,0,0,0.15);border:1px solid #990000;color:#fff;border-radius:8px;padding:10px;margin-bottom:15px;">
        <button class="btn btn-sang" style="width:100%;" onclick="confirmButin()"><span>Confirmer</span></button>
        <button onclick="document.getElementById('butinModal').style.display='none'" style="display:block;margin:12px auto 0;color:#555;background:none;border:none;font-size:13px;">Annuler</button>
    </div>
</div>

</body>
</html>
